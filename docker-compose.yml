version: "3.9"

services:
  app:
    build: .
    container_name: bible-theology-notebook
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/backend/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/backend/data/notebook.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
